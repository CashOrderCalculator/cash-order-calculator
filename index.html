<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cash Order Calculator</title>

<style>
/* =====================================================
   Primary Colour Palette
===================================================== */
:root {
  --primary-accent: rgb(224, 223, 0);   /* Yellow */
  --primary-text: rgb(1, 1, 1);         /* Black */
  --dark-neutral: rgb(72, 73, 74);      /* Dark Grey */
  --neutral-grey: rgb(130, 130, 130);   /* Mid Grey */
  --negative-accent: rgb(180, 0, 0, 0.35); /* Recommended Order: No */
}

/* =====================================================
   Global
===================================================== */
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: rgb(246, 246, 246);
  max-width: 1200px;
  margin: 0 auto;
  padding: 5px 5px;
  color: var(--primary-text);
}

.app-card {
  background: #ffffff;
  border-radius: 10px;
  padding: 5px 6px;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
}

h2 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 0px;
  color: var(--primary-text);
}

/* =====================================================
   Controls
===================================================== */
.controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 10px;
  margin-bottom: 5px;
}

label {
  font-size: 13px;
  color: var(--dark-neutral);
  display: flex;
  flex-direction: column;
}

select,
input[type="number"],
input[type="text"] {
  height: 24px;
  border-radius: 6px;
  border: 1px solid var(--neutral-grey);
  padding: 0 12px;
  font-size: 14px;
  background: #ffffff;
  color: var(--primary-text);
}

select:focus,
input:focus {
  outline: none;
  border-color: var(--primary-accent);
  box-shadow: 0 0 0 2px rgba(224, 223, 0, 0.35);
}

/* =====================================================
   Table
===================================================== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 5px;
  font-size: 14px;
  background: #ffffff;
}

th {
  background: rgb(240, 240, 240);
  font-weight: 600;
  color: var(--dark-neutral);
}

th,
td {
  border: 1px solid var(--neutral-grey);
  padding: 10px;
  text-align: center;
}

//td:nth-child(3),
//td:nth-child(4),
//td:nth-child(5) {
  //text-align: right;
  //padding-right: 12px;
//}

tbody tr:hover {
  background: rgba(130, 130, 130, 0.08);
}

/* =====================================================
   SharePoint-safe validation
===================================================== */
input.input-warn {
  border-color: var(--primary-accent);
  box-shadow: inset 0 0 0 1000px rgb(255, 255, 225);
}

input.input-error {
  border-color: rgb(180, 0, 0);
  box-shadow: inset 0 0 0 1000px rgb(255, 230, 230);
}

input.input-warn:focus {
  box-shadow:
    inset 0 0 0 1000px rgb(255, 255, 225),
    0 0 0 2px rgba(224, 223, 0, 0.35);
}

input.input-error:focus {
  box-shadow:
    inset 0 0 0 1000px rgb(255, 230, 230),
    0 0 0 2px rgba(180, 0, 0, 0.35);
}

/* =====================================================
   Summary / Comment
===================================================== */
.summary {
display: inline-block;
  margin-top: 5px;
  padding: 10px 16px;
  background: rgb(250, 250, 230);
  border-left: 4px solid var(--primary-accent);
  border-radius: 4px;
  font-weight: 600;
  color: var(--primary-text);
}
.summary.negative {
  background: var(--negative-accent);
  color: #fff; /* improves contrast */
  border-left-color: var(--negative-accent);
}
.comment {
  margin-top: 1px;
  padding: 5px 8px;
  background: #ffffff;
  border-left: 4px solid var(--dark-neutral);
  border-radius: 4px;
  font-family: Consolas, monospace;
  font-weight: 600;
  color: var(--dark-neutral);
}

/* =====================================================
   Save Button
===================================================== */
.saveBtn {
  margin-top: 5px;
  padding: 12px 20px;
  background: var(--primary-accent);
  color: var(--primary-text);
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.saveBtn:hover {
  background: rgb(204, 203, 0);
}

.saveBtn:active {
  background: rgb(170, 169, 0);
}
</style></head>

<div class="app-card">

<h2>Cash Order Calculator</h2>

<div class="controls">
  <label>
    Search Site

  </label>

  <label>
    Site Name

  </label>

  <label>
    Offer

  </label>

  <label>
    Days Until Delivery

  </label>
</div>

<div style="display:flex; gap:20px; align-items:flex-start;">

<div style="display:flex; gap:20px; align-items:flex-start;">

<div style="display:flex; gap:20px; align-items:flex-start;">

<div style="display:flex; gap:20px; align-items:flex-start; width:100%;">

<div style="display:flex; gap:20px; align-items:flex-start;">

    <div id="tableContainer"></div>

    <div class="summary" id="currentContentTotal">
      <div>Current Content Total : 
      Notes: $<span id="notesTotal">0.00</span>
      Coins: $<span id="coinsTotal">0.00</span></div>
    </div>

    <button class="saveBtn" onclick="finaliseOrder()">
      Save / Finalise Order
    </button>

  </div>

  <!-- RIGHT -->
  <div style="flex:0 0 365px; display:flex; flex-direction:column; gap:9px;">

    <div class="summary" id="summary"></div>

    <div id="recSummaryTable"></div>
    <div class="comment" id="ReccomnededTotal"></div>
    <div style="font-weight:bold;">Comment: Must be copied to order</div>
    <div class="comment" id="comment"></div>
    <button class="saveBtn" onclick="copyComment()">Copy Comment</button>

  </div>

</div>

  list.forEach(s=>siteSelect.add(new Option(s,s)));
}

function initSites(){
  ALL_SITES=[...new Set(NORMALISED.map(r=>r.SiteName))].sort();
  populateSiteSelect(ALL_SITES);
}

siteSearch.addEventListener("input",()=>{
  const t=siteSearch.value.toLowerCase();
  const f=ALL_SITES.filter(s=>s.toLowerCase().includes(t));
  populateSiteSelect(f);
  if(f.length){ siteSelect.value=f[0]; updateOffers(); }
});

function updateOffers(){
  const offers=[...new Set(
    NORMALISED.filter(r=>r.SiteName===siteSelect.value)
              .map(r=>r.EmailPrefix)
  )];
  offerSelect.innerHTML="";
  offers.forEach(o=>offerSelect.add(new Option(o,o)));
  render();
}
/* =====================================================
   CURRENT CONTENT 
===================================================== */
function calculateCurrentContentTotals() {
  const NOTE_DENOMS = [20, 10, 5];
  const COIN_DENOMS = [2, 1, 0.2, 0.1, 0.05];

  let notesTotal = 0;
  let coinsTotal = 0;

  // ✅ Loop over user-entered values, not rows/Dispensed
  Object.entries(state.inputs).forEach(([key, value]) => {
    if (value == null) return;

    // key format: Denomination_Hopper_Index
    const denom = Number(key.split("_")[0]);

    if (NOTE_DENOMS.includes(denom)) {
      notesTotal += value;
    } else if (COIN_DENOMS.includes(denom)) {
      coinsTotal += value;
    }
  });

  document.getElementById("notesTotal").textContent =
    notesTotal.toFixed(2);

  document.getElementById("coinsTotal").textContent =
    coinsTotal.toFixed(2);
}

/* =====================================================
   RENDER + CALCULATION
===================================================== */
function render(){
  state.rows=NORMALISED
    .filter(r=>r.SiteName===siteSelect.value && r.EmailPrefix===offerSelect.value)
    .sort((a, b) => {
  const NOTE_ORDER = [5, 10, 20];
  const COIN_ORDER = [2, 1, 0.2, 0.1, 0.05];

  function getDenominationRank(d) {
    if (NOTE_ORDER.includes(d)) {
      return NOTE_ORDER.indexOf(d);
    }
    if (COIN_ORDER.includes(d)) {
      return 100 + COIN_ORDER.indexOf(d);
    }
    return 999;
  }

  const rankDiff =
    getDenominationRank(a.Denomination) -
    getDenominationRank(b.Denomination);

  if (rankDiff !== 0) return rankDiff;

  return a.HopperNumber - b.HopperNumber;
});

  tableContainer.innerHTML=`
  <table><thead><tr>
    <th>Denomination</th><th>Hopper</th><th>Maximum Capacity ($)</th>
<th>Current Content ($)</th>
  </tr></thead><tbody>
  ${state.rows.map((r,i)=>{
    const k=`${r.Denomination}_${r.HopperNumber}_${i}`;
    return `<tr>
      <td>${denomLabel(r.Denomination)}</td>
      <td>${r.HopperNumber}</td>
<td>$${MAX_BY_DENOM[r.Denomination]}</td>
<td>$
  <input
    class="current-content-input"
    data-key="${k}"
    type="number"
    value="${state.inputs[k] ?? ""}"
    title=""
  >
</td>
    </tr>`;
  }).join("")}
  </tbody></table>`;

  document.querySelectorAll("input[data-key]").forEach(i=>{
    i.oninput=e=>{
      state.inputs[e.target.dataset.key]=e.target.value===""?null:Number(e.target.value);
      calculate();
    }
  });
  calculate();
}
function roundToDenomination(value, denom) {
  const step = Number(denom);

  if (!step || step <= 0) return value;

  return Math.round(value / step) * step;
}

function calculate() {
  let total = 0;
  let hasError = false;

  const denomRows = {};
  state.rec = {};

  const days = Math.max(1, Number(daysInput.value || 1));
  const dayFactor = Math.max(1, days); // ✅ FIXED (includes today)

  state.rows.forEach((r, i) => {
    const k = `${r.Denomination}_${r.HopperNumber}_${i}`;
    const val = state.inputs[k];

    if (!denomRows[r.Denomination]) denomRows[r.Denomination] = [];
    denomRows[r.Denomination].push({ r, i, k, val });
  });

  const provisional = [];

  Object.keys(denomRows).forEach(den => {

    const rows = denomRows[den];
    const rule = RULES[den];
    const max = MAX_BY_DENOM[den];

    const baseResults = [];

rows.forEach(item => {
  let val = item.val;

  const inputEl = document.querySelector(`input[data-key="${item.k}"]`);

  if (inputEl) {
    inputEl.classList.remove("input-error", "input-warn");
    inputEl.title = "";
  }

  if (val == null || val === "") return;
  val = Number(val);

  if (val > max) {
    hasError = true;
    if (inputEl) {
      inputEl.classList.add("input-error");
      inputEl.title = `Error: exceeds max capacity ($${max})`;
    }
  } else if ((val / den) % 1 !== 0) {
    if (inputEl) {
      inputEl.classList.add("input-warn");
      inputEl.title = `Warning: must be multiple of ${denomLabel(Number(den))}`;
    }
  }

  const deficit = max - val;

  const forecast =
    (Number(item.r.Dispensed) || 0) /
    (Number(item.r.Count) || 1) *
    dayFactor;

  // 🚨 HARD MIN RULE (this is the missing logic)
  if (deficit < rule.min) {
    baseResults.push(0);
    return;
  }

  const baseOrder = Math.floor(deficit / rule.pack) * rule.pack;

  const raw = baseOrder + forecast;

  baseResults.push(raw);
});

    let groupValue = Math.min(...baseResults);
    if (!isFinite(groupValue)) groupValue = 0;

    groupValue = Math.floor(groupValue / rule.pack) * rule.pack;
    groupValue = Math.min(groupValue, max);

    rows.forEach(item => {
      state.rec[item.k] = groupValue;

      provisional.push({
        k: item.k,
        den: Number(den),
        order: groupValue
      });

      total += groupValue;
    });
  });

  const byDen = {};

  Object.keys(denomRows).forEach(den => {
    byDen[den] = [];
    denomRows[den].forEach(item => {
      const val = state.rec[item.k] || 0;
      byDen[den].push({ order: val });
    });
  });

  // =========================
  // UI
  // =========================
  summary.textContent =
    hasError
      ? "Recommended Order: (errors present)"
      : total < 1000
        ? "Recommended Order: No"
        : "Recommended Order: Yes";

  summary.classList.toggle("negative", hasError || total < 1000);

  // ✅ NEW: Recommended Total Display
  document.getElementById("ReccomnededTotal").textContent =
    `Total: $${total.toFixed(2)}`;

  if (total >= 1000 && !hasError) {
    renderRecSummary(byDen);
  } else {
    document.getElementById("recSummaryTable").innerHTML = "";
  }

  calculateCurrentContentTotals();
  buildComment(provisional);
}

function renderRecSummary(byDen) {

  let html = `
    <table>
      <thead>
        <tr>
          <th>Denomination</th>
          <th>Recommended Order</th>
        </tr>
      </thead>
      <tbody>
  `;

  Object.keys(byDen)
    .sort((a,b)=>b-a)
    .forEach(den => {

      const sum = byDen[den].reduce((acc, x) => acc + x.order, 0);

      html += `
        <tr>
          <td>${denomLabel(Number(den))}</td>
          <td>$${sum.toFixed(2)}</td>
        </tr>
      `;
    });

  html += `</tbody></table>`;

  document.getElementById("recSummaryTable").innerHTML = html;
}
/* =====================================================
   COMMENT
===================================================== */
function buildComment(provisional) {
  const coins = ["$2", "$1", "20c", "10c", "5c"];
  let groups = {};

  // STEP 1: group by denomination first
  state.rows.forEach((r, i) => {

    const lab = denomLabel(r.Denomination);
    if (!coins.includes(lab)) return;

    const k = `${r.Denomination}_${r.HopperNumber}_${i}`;

    const recValue = state.rec[k];

    const value = (recValue === null || recValue === undefined || recValue === "")
      ? 0
      : Math.round(recValue);

    if (!groups[lab]) groups[lab] = [];

    groups[lab].push({
      hopper: r.HopperNumber,
      value
    });
  });

  // STEP 2: REMOVE single-hopper denominations (KEY FIX)
  Object.keys(groups).forEach(k => {
    if (groups[k].length <= 1) {
      delete groups[k];
    }
  });

  const totalHoppers = state.rows.filter(r =>
    coins.includes(denomLabel(r.Denomination))
  ).length;

  // STEP 3: build output
  let txt = `${totalHoppers}:`;

  coins.forEach(c => {
    if (groups[c]) {
      txt += ` ${c} ` + groups[c]
        .sort((a, b) => a.hopper - b.hopper)
        .map(x => `${x.value}H${x.hopper}`)
        .join(" ");
    }
  });

  comment.textContent = txt + " /";
}
/* =====================================================
   SAVE
===================================================== */
function finaliseOrder() {
  if (!confirm("Have you finished your order and submitted it in the Armaguard Portal?")) return;

  // =========================
  // BUILD DATA
  // =========================
  const rows = [];

  state.rows.forEach((r, i) => {
    const k = `${r.Denomination}_${r.HopperNumber}_${i}`;

    rows.push({
      Site: r.SiteName,
      Offer: r.EmailPrefix,
      Denomination: denomLabel(r.Denomination),
      Hopper: r.HopperNumber,
      Current: state.inputs[k] ?? 0,
      Recommended: state.rec[k] ?? 0
    });
  });

  const commentText = document.getElementById("comment").textContent || "";
  const totalText = document.getElementById("ReccomnededTotal").textContent;

  // =========================
  // FORMAT TABLE (fixed width)
  // =========================
  function pad(str, len) {
    return String(str).padEnd(len, " ");
  }

  const header =
    pad("Denom", 8) +
    pad("Hopper", 8) +
    pad("Current", 12) +
    pad("Recommended", 14);

  const divider = "-".repeat(42);

  const tableRows = rows.map(r =>
    pad(r.Denomination, 8) +
    pad(r.Hopper, 8) +
    pad(`$${Number(r.Current).toFixed(2)}`, 12) +
    pad(`$${Number(r.Recommended).toFixed(2)}`, 14)
  );

  const tableText = [header, divider, ...tableRows].join("\n");

  // =========================
  // EMAIL CONTENT
  // =========================
  const subject = encodeURIComponent("Cash Order Submission");

  const body = encodeURIComponent(
`Cash Order Completed

Site: ${siteSelect.value}
Offer: ${offerSelect.value}
${totalText}

------------------------------------------
DETAILS
------------------------------------------
${tableText}

------------------------------------------
COMMENT
------------------------------------------
${commentText}
`
  );

  // Open email client
  window.location.href = `mailto:j.hall@otr.com.au?subject=${subject}&body=${body}`;

  // =========================
  // DOWNLOAD CSV (unchanged)
  // =========================
  const csv = ["SiteName,Offer,Denomination,Hopper,CurrentContent,RecommendedOrder"];

  rows.forEach(r => {
    csv.push([
      r.Site,
      r.Offer,
      r.Denomination,
      r.Hopper,
      r.Current,
      r.Recommended
    ].join(","));
  });

  csv.push(["Comment", commentText].join(","));

  const csvString = csv.join("\n");
  const fileName = `cash_order_${siteSelect.value}_${Date.now()}.csv`;

  const blob = new Blob([csvString], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;

  document.body.appendChild(a);
  a.click();

  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 1000);

  setTimeout(() => {
    location.reload();
  }, 2000);
}
/* =====================================================
   INIT
===================================================== */
initSites();
siteSelect.onchange=updateOffers;
offerSelect.onchange=render;
daysInput.oninput=calculate;
updateOffers();
</script>
