<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cash Order Calculator</title>

<style>
/* =====================================================
   Primary Colour Palette
===================================================== */
:root {
  --primary-accent: rgb(224, 223, 0);   /* Yellow */
  --primary-text: rgb(1, 1, 1);         /* Black */
  --dark-neutral: rgb(72, 73, 74);      /* Dark Grey */
  --neutral-grey: rgb(130, 130, 130);   /* Mid Grey */
  --negative-accent: rgb(180, 0, 0, 0.35); /* Recommended Order: No */
}

/* =====================================================
   Global
===================================================== */
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: rgb(246, 246, 246);
  max-width: 1200px;
  margin: 0 auto;
  padding: 5px 5px;
  color: var(--primary-text);
}

.app-card {
  background: #ffffff;
  border-radius: 10px;
  padding: 5px 6px;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
}

h2 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 0px;
  color: var(--primary-text);
}

/* =====================================================
   Controls
===================================================== */
.controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 10px;
  margin-bottom: 5px;
}

label {
  font-size: 13px;
  color: var(--dark-neutral);
  display: flex;
  flex-direction: column;
}

select,
input[type="number"],
input[type="text"] {
  height: 24px;
  border-radius: 6px;
  border: 1px solid var(--neutral-grey);
  padding: 0 12px;
  font-size: 14px;
  background: #ffffff;
  color: var(--primary-text);
}

select:focus,
input:focus {
  outline: none;
  border-color: var(--primary-accent);
  box-shadow: 0 0 0 2px rgba(224, 223, 0, 0.35);
}

/* =====================================================
   Table
===================================================== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 5px;
  font-size: 14px;
  background: #ffffff;
}

th {
  background: rgb(240, 240, 240);
  font-weight: 600;
  color: var(--dark-neutral);
}

th,
td {
  border: 1px solid var(--neutral-grey);
  padding: 10px;
  text-align: center;
}

//td:nth-child(3),
//td:nth-child(4),
//td:nth-child(5) {
  //text-align: right;
  //padding-right: 12px;
//}

tbody tr:hover {
  background: rgba(130, 130, 130, 0.08);
}

/* =====================================================
   SharePoint-safe validation
===================================================== */
input.input-warn {
  border-color: var(--primary-accent);
  box-shadow: inset 0 0 0 1000px rgb(255, 255, 225);
}

input.input-error {
  border-color: rgb(180, 0, 0);
  box-shadow: inset 0 0 0 1000px rgb(255, 230, 230);
}

input.input-warn:focus {
  box-shadow:
    inset 0 0 0 1000px rgb(255, 255, 225),
    0 0 0 2px rgba(224, 223, 0, 0.35);
}

input.input-error:focus {
  box-shadow:
    inset 0 0 0 1000px rgb(255, 230, 230),
    0 0 0 2px rgba(180, 0, 0, 0.35);
}

/* =====================================================
   Summary / Comment
===================================================== */
.summary {
display: inline-block;
  margin-top: 5px;
  padding: 10px 16px;
  background: rgb(250, 250, 230);
  border-left: 4px solid var(--primary-accent);
  border-radius: 4px;
  font-weight: 600;
  color: var(--primary-text);
}
.summary.negative {
  background: var(--negative-accent);
  color: #fff; /* improves contrast */
  border-left-color: var(--negative-accent);
}
.comment {
  margin-top: 5px;
  padding: 10px 16px;
  background: #ffffff;
  border-left: 4px solid var(--dark-neutral);
  border-radius: 4px;
  font-family: Consolas, monospace;
  font-weight: 600;
  color: var(--dark-neutral);
}

/* =====================================================
   Save Button
===================================================== */
.saveBtn {
  margin-top: 5px;
  padding: 12px 20px;
  background: var(--primary-accent);
  color: var(--primary-text);
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.saveBtn:hover {
  background: rgb(204, 203, 0);
}

.saveBtn:active {
  background: rgb(170, 169, 0);
}
</style></head>

<body>
<div class="app-card">

<h2>Cash Order Calculator</h2>

<div class="controls">
  <label>
    Search Site
    <input id="siteSearch" type="text" placeholder="Type to filter sites…">
  </label>

  <label>
    Site Name
    <select id="siteSelect"></select>
  </label>

  <label>
    Offer
    <select id="offerSelect"></select>
  </label>

  <label>
    Days Until Delivery
    <input id="days" type="number" value="1" min="1">
  </label>
</div>

<div style="display:flex; gap:20px; align-items:flex-start;">

<div style="display:flex; gap:20px; align-items:flex-start;">

<div style="display:flex; gap:20px; align-items:flex-start;">

<div style="display:flex; gap:20px; align-items:flex-start; width:100%;">

<div style="display:flex; gap:20px; align-items:flex-start;">

  <!-- LEFT -->
  <div style="flex:0 0 800px; display:flex; flex-direction:column; gap:10px;">
    
    <div id="tableContainer"></div>

    <div class="summary" id="currentContentTotal">
      <div>Current Content Total : 
      Notes: $<span id="notesTotal">0.00</span>
      Coins: $<span id="coinsTotal">0.00</span></div>
    </div>

    <button class="saveBtn" onclick="finaliseOrder()">
      Save / Finalise Order
    </button>

  </div>

  <!-- RIGHT -->
  <div style="flex:0 0 365px; display:flex; flex-direction:column; gap:10px;">

    <div class="summary" id="summary"></div>

    <div id="recSummaryTable"></div>
    <div style="font-weight:bold;">Comment: Must be copied to order</div>
    <div class="comment" id="comment"></div>
    <button class="saveBtn" onclick="copyComment()">Copy Comment</button>

  </div>

</div>
<script>
/* =====================================================
   EMBEDDED DATA
===================================================== */
const DATA = [
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 0.05, HopperNumber: 6, Dispensed: 128.0, Count: 365 },
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 0.1, HopperNumber: 5, Dispensed: 300.0, Count: 365 },
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 0.2, HopperNumber: 3, Dispensed: 700.0, Count: 365 },
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 0.2, HopperNumber: 4, Dispensed: 720.0, Count: 365 },
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 1.0, HopperNumber: 2, Dispensed: 1440.0, Count: 365 },
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 2.0, HopperNumber: 1, Dispensed: 3200.0, Count: 365 },
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 5.0, HopperNumber: 1, Dispensed: 16415.0, Count: 365 },
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 10.0, HopperNumber: 2, Dispensed: 35020.0, Count: 365 },
  { SiteName: 'GRO Dulwich Grocery', EmailPrefix: 'GRO', LocID: 7601, Denomination: 20.0, HopperNumber: 3, Dispensed: 38280.0, Count: 365 },

];


/* =====================================================
   COPY COMMENT
===================================================== */
function copyComment() {
  const text = document.getElementById("comment").textContent;

  if (!text) {
    alert("No comment to copy");
    return;
  }

  navigator.clipboard.writeText(text)

}

/* =====================================================
   NORMALISE DATA
===================================================== */
const NORMALISED = DATA.map(r => ({
  SiteName: r.SiteName,
  EmailPrefix: r.EmailPrefix ?? "(None)",
  Denomination: Number(r.Denomination),
  HopperNumber: Number(r.HopperNumber),
  Dispensed: Number(r.Dispensed),
  Count: Number(r.Count)
}));

/* =====================================================
   CONSTANTS
===================================================== */
const MAX_BY_DENOM = {
  20:8000, 10:4000, 5:2000, 2:2500,
  1:800, 0.2:132, 0.1:120, 0.05:100
};

const RULES = {
  20:{pack:100,min:500},
  10:{pack:100,min:500},
  5:{pack:100,min:500},
  2:{pack:100,min:200},
  1:{pack:100,min:200},
  0.2:{pack:4,min:40},
  0.1:{pack:4,min:20},
  0.05:{pack:2,min:20}
};

function denomLabel(d){ return d >= 1 ? `$${d}` : `${Math.round(d*100)}c`; }

/* =====================================================
   STATE + DOM
===================================================== */
const state = { inputs:{}, rows:[], rec:{} };
let ALL_SITES = [];

const siteSearch = document.getElementById("siteSearch");
const siteSelect = document.getElementById("siteSelect");
const offerSelect = document.getElementById("offerSelect");
const daysInput = document.getElementById("days");

/* =====================================================
   SITE SEARCH
===================================================== */
function populateSiteSelect(list){
  siteSelect.innerHTML="";
  list.forEach(s=>siteSelect.add(new Option(s,s)));
}

function initSites(){
  ALL_SITES=[...new Set(NORMALISED.map(r=>r.SiteName))].sort();
  populateSiteSelect(ALL_SITES);
}

siteSearch.addEventListener("input",()=>{
  const t=siteSearch.value.toLowerCase();
  const f=ALL_SITES.filter(s=>s.toLowerCase().includes(t));
  populateSiteSelect(f);
  if(f.length){ siteSelect.value=f[0]; updateOffers(); }
});

function updateOffers(){
  const offers=[...new Set(
    NORMALISED.filter(r=>r.SiteName===siteSelect.value)
              .map(r=>r.EmailPrefix)
  )];
  offerSelect.innerHTML="";
  offers.forEach(o=>offerSelect.add(new Option(o,o)));
  render();
}
/* =====================================================
   CURRENT CONTENT 
===================================================== */
function calculateCurrentContentTotals() {
  const NOTE_DENOMS = [20, 10, 5];
  const COIN_DENOMS = [2, 1, 0.2, 0.1, 0.05];

  let notesTotal = 0;
  let coinsTotal = 0;

  // ✅ Loop over user-entered values, not rows/Dispensed
  Object.entries(state.inputs).forEach(([key, value]) => {
    if (value == null) return;

    // key format: Denomination_Hopper_Index
    const denom = Number(key.split("_")[0]);

    if (NOTE_DENOMS.includes(denom)) {
      notesTotal += value;
    } else if (COIN_DENOMS.includes(denom)) {
      coinsTotal += value;
    }
  });

  document.getElementById("notesTotal").textContent =
    notesTotal.toFixed(2);

  document.getElementById("coinsTotal").textContent =
    coinsTotal.toFixed(2);
}

/* =====================================================
   RENDER + CALCULATION
===================================================== */
function render(){
  state.rows=NORMALISED
    .filter(r=>r.SiteName===siteSelect.value && r.EmailPrefix===offerSelect.value)
    .sort((a,b)=>b.Denomination-a.Denomination||a.HopperNumber-b.HopperNumber);

  tableContainer.innerHTML=`
  <table><thead><tr>
    <th>Denomination</th><th>Hopper</th><th>Maximum Capacity ($)</th>
<th>Current Content ($)</th>
  </tr></thead><tbody>
  ${state.rows.map((r,i)=>{
    const k=`${r.Denomination}_${r.HopperNumber}_${i}`;
    return `<tr>
      <td>${denomLabel(r.Denomination)}</td>
      <td>${r.HopperNumber}</td>
<td>${MAX_BY_DENOM[r.Denomination]}</td>
<td>
  <input
    class="current-content-input"
    data-key="${k}"
    type="number"
    value="${state.inputs[k] ?? ""}"
    title=""
  >
</td>
    </tr>`;
  }).join("")}
  </tbody></table>`;

  document.querySelectorAll("input[data-key]").forEach(i=>{
    i.oninput=e=>{
      state.inputs[e.target.dataset.key]=e.target.value===""?null:Number(e.target.value);
      calculate();
    }
  });
  calculate();
}
function roundToDenomination(value, denom) {
  const step = Number(denom);

  if (!step || step <= 0) return value;

  return Math.round(value / step) * step;
}
function calculate() {
  let total = 0;
  let hasError = false;

  const denomRows = {};
  state.rec = {};

  const days = Math.max(1, Number(daysInput.value || 1));
  const dayFactor = Math.max(0, days - 1); // 🔥 day 1 = 0 effect

  // =========================
  // GROUP ROWS BY DENOM
  // =========================
  state.rows.forEach((r, i) => {
    const k = `${r.Denomination}_${r.HopperNumber}_${i}`;
    const val = state.inputs[k];

    if (!denomRows[r.Denomination]) denomRows[r.Denomination] = [];
    denomRows[r.Denomination].push({ r, i, k, val });
  });

  const provisional = [];

  // =========================
  // CALC PER DENOM
  // =========================
  Object.keys(denomRows).forEach(den => {

    const rows = denomRows[den];
    const rule = RULES[den];
    const max = MAX_BY_DENOM[den];

    const tempResults = [];

    let denomValid = true;

    // =========================
    // VALIDATION
    // =========================
    rows.forEach(item => {
      let val = item.val;

      if (val == null || val === "") return;
      val = Number(val);

      if (val > max) hasError = true;

      const deficit = max - val;
      if (deficit < rule.min) denomValid = false;
    });

    // =========================
    // PER HOPPER CALC
    // =========================
    rows.forEach(item => {

      let val = item.val;
      if (val == null || val === "") return;

      val = Number(val);

      const deficit = max - val;

      // base order (capacity logic)
      let baseOrder = 0;

      if (denomValid) {
        baseOrder = Math.floor(deficit / rule.pack) * rule.pack;
      }

      // forecast per hopper
      const forecast =
        (Number(item.r.Dispensed) || 0) /
        (Number(item.r.Count) || 1) *
        dayFactor;

      let final = baseOrder + forecast;

      // round to denomination
      final = roundToDenomination(final, Number(den));

      // cap at max capacity
      final = Math.min(final, max);

      tempResults.push({
        ...item,
        final
      });
    });

    // =========================
    // APPLY (consistency: use MAX of hopper values, not min)
    // =========================
    const groupValue = Math.max(...tempResults.map(x => x.final));

    tempResults.forEach(item => {

      state.rec[item.k] = groupValue;

      provisional.push({
        k: item.k,
        den: Number(den),
        order: groupValue
      });

      total += groupValue;
    });
  });

  // =========================
  // SUMMARY BUILD
  // =========================
  const byDen = {};

  Object.keys(denomRows).forEach(den => {
    byDen[den] = [];

    denomRows[den].forEach(item => {
      const val = state.rec[item.k] || 0;
      byDen[den].push({ order: val });
    });
  });

  // =========================
  // UI
  // =========================
  summary.textContent =
    hasError
      ? "Recommended Order: (errors present)"
      : total < 1000
        ? "Recommended Order: No"
        : "Recommended Order: Yes";

  summary.classList.toggle("negative", hasError || total < 1000);

  if (total >= 1000 && !hasError) {
    renderRecSummary(byDen);
  } else {
    document.getElementById("recSummaryTable").innerHTML = "";
  }

  calculateCurrentContentTotals();
  buildComment(provisional);
}function renderRecSummary(byDen) {

  let html = `
    <table>
      <thead>
        <tr>
          <th>Denomination</th>
          <th>Recommended Order</th>
        </tr>
      </thead>
      <tbody>
  `;

  Object.keys(byDen)
    .sort((a,b)=>b-a)
    .forEach(den => {

      const sum = byDen[den].reduce((acc, x) => acc + x.order, 0);

      html += `
        <tr>
          <td>${denomLabel(Number(den))}</td>
          <td>$${sum.toFixed(2)}</td>
        </tr>
      `;
    });

  html += `</tbody></table>`;

  document.getElementById("recSummaryTable").innerHTML = html;
}
/* =====================================================
   COMMENT
===================================================== */
function buildComment(provisional) {
  const coins = ["$2", "$1", "20c", "10c", "5c"];
  let groups = {};

  // STEP 1: group by denomination first
  state.rows.forEach((r, i) => {

    const lab = denomLabel(r.Denomination);
    if (!coins.includes(lab)) return;

    const k = `${r.Denomination}_${r.HopperNumber}_${i}`;

    const recValue = state.rec[k];

    const value = (recValue === null || recValue === undefined || recValue === "")
      ? 0
      : Math.round(recValue);

    if (!groups[lab]) groups[lab] = [];

    groups[lab].push({
      hopper: r.HopperNumber,
      value
    });
  });

  // STEP 2: REMOVE single-hopper denominations (KEY FIX)
  Object.keys(groups).forEach(k => {
    if (groups[k].length <= 1) {
      delete groups[k];
    }
  });

  const totalHoppers = state.rows.filter(r =>
    coins.includes(denomLabel(r.Denomination))
  ).length;

  // STEP 3: build output
  let txt = `${totalHoppers}:`;

  coins.forEach(c => {
    if (groups[c]) {
      txt += ` ${c} ` + groups[c]
        .sort((a, b) => a.hopper - b.hopper)
        .map(x => `${x.value}H${x.hopper}`)
        .join(" ");
    }
  });

  comment.textContent = txt + " /";
}
/* =====================================================
   SAVE
===================================================== */
function finaliseOrder() {
  if (!confirm("Have you finished your order and submitted it in the Armaguard Portal?")) return;

  const csv = ["SiteName,Offer,Denomination,Hopper,CurrentContent,RecommendedOrder"];

  state.rows.forEach((r, i) => {
    const k = `${r.Denomination}_${r.HopperNumber}_${i}`;

    const recValue = state.rec[k];

csv.push([
  r.SiteName,
  r.EmailPrefix,
  r.Denomination,
  r.HopperNumber,
  state.inputs[k] ?? "",
  recValue ?? ""
].join(","));
  });

  // ✅ ADD COMMENT ROW (this is what you're missing)
  csv.push(["Comment", comment.textContent || ""].join(","));

  const blob = new Blob([csv.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "cash_order.csv";

  document.body.appendChild(a);

// ✅ MUST be synchronous user gesture
a.click();

// cleanup after browser has time to start download
setTimeout(() => {
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}, 1000);

// refresh after download initiation window
setTimeout(() => {
  location.reload();
}, 2000);
}
/* =====================================================
   INIT
===================================================== */
initSites();
siteSelect.onchange=updateOffers;
offerSelect.onchange=render;
daysInput.oninput=calculate;
updateOffers();
</script>

</div>
</body>
</html>
